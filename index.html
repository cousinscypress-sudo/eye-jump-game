<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Jump Game</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
  }

  canvas {
    border: 2px solid #00ffcc;
    display: block;
    margin: 20px auto;
    background: #111;
  }
</style>
</head>

<body>

<h2>👁️ Close Eyes = Jump</h2>

<canvas id="game" width="600" height="200"></canvas>

<script>

// ✅ FIXED MODEL PATH (your folder)
const MODEL_URL = "./tm-my-image-model/";

let model, webcam;
let lastJumpTime = 0;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 150,
  width: 20,
  height: 20,
  velocityY: 0,
  jumping: false
};

let gravity = 1.5;
let obstacles = [];
let frame = 0;
let score = 0;

async function init() {
  try {
    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    webcam = new tmImage.Webcam(200, 200, true);

    await webcam.setup();   // camera popup
    await webcam.play();

    // 🔥 REQUIRED (this was missing before)
    document.body.appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

  } catch (err) {
    console.error(err);
    alert("Model or webcam failed. Check console.");
  }
}

async function loop() {
  webcam.update();
  await predict();
  updateGame();
  drawGame();
  requestAnimationFrame(loop);
}

async function predict() {
  const preds = await model.predict(webcam.canvas);

  let open = 0;
  let closed = 0;

  for (let p of preds) {
    const name = p.className.toLowerCase();
    if (name.includes("open")) open = p.probability;
    if (name.includes("closed")) closed = p.probability;
  }

  const now = Date.now();

  if (
    closed > 0.85 &&
    closed > open &&
    !player.jumping &&
    now - lastJumpTime > 500
  ) {
    player.velocityY = -15;
    player.jumping = true;
    lastJumpTime = now;
  }
}

function updateGame() {
  frame++;
  score++;

  player.y += player.velocityY;
  player.velocityY += gravity;

  if (player.y >= 150) {
    player.y = 150;
    player.jumping = false;
  }

  if (frame % 90 === 0) {
    obstacles.push({ x: 600, y: 150, w: 20, h: 20 });
  }

  obstacles.forEach(o => o.x -= 5);

  obstacles.forEach(o => {
    if (
      player.x < o.x + o.w &&
      player.x + player.width > o.x &&
      player.y < o.y + o.h &&
      player.y + player.height > o.y
    ) {
      alert("Game Over! Score: " + score);
      location.reload();
    }
  });
}

function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = "red";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

  ctx.fillStyle = "#00ffcc";
  ctx.fillText("Score: " + score, 10, 20);
}

init();

</script>

</body>
</html>
