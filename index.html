<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Jump Game</title>

<!-- ✅ FIXED LIBRARIES (this was your main bug) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
  }

  canvas {
    border: 2px solid #00ffcc;
    display: block;
    margin: 20px auto;
    background: #111;
  }
  <div id="gameOverScreen" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
  justify-content:center;
  align-items:center;
  flex-direction:column;
">

  <h1>GAME OVER</h1>
  <p id="finalScore">Score: 0</p>

  <button onclick="restartGame()" style="
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    background:#00ffcc;
    border:none;
    margin-top:20px;
  ">
    Restart
  </button>
</style>
</head>

<body>

<h2>👁️ Close Eyes = Jump</h2>

<canvas id="game" width="600" height="200"></canvas>

<script>

// ✅ YOUR MODEL FOLDER
const MODEL_URL = "./tm-my-image-model/";

let model, webcam;
let lastJumpTime = 0;

// GAME SETUP
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 150,
  width: 20,
  height: 20,
  velocityY: 0,
  jumping: false
};

let gravity = 1.5;
let obstacles = [];
let frame = 0;
let score = 0;
let closedFrames = 0;
let openFrames = 0;
let gameRunning = true;
// ================= INIT =================
async function init() {
  try {
    console.log("Loading model...");

    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    console.log("Model loaded");

    webcam = new tmImage.Webcam(200, 200, true);

    await webcam.setup();  // 👈 camera popup
    await webcam.play();

    console.log("Webcam started");

    // 🔥 IMPORTANT: show webcam on page
    document.body.appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

  } catch (err) {
    console.error("ERROR:", err);
    alert("Failed to load model or webcam. Check console.");
  }
}

// ================= LOOP =================
async function loop() {
  if (!gameRunning) return;

  webcam.update();
  await predict();
  updateGame();
  drawGame();

  requestAnimationFrame(loop);
}
// ================= PREDICT =================
async function predict() {
  const preds = await model.predict(webcam.canvas);

  let open = 0;
  let closed = 0;

  for (let p of preds) {
    const name = p.className.toLowerCase();
    if (name.includes("open")) open = p.probability;
    if (name.includes("closed")) closed = p.probability;
  }

  const now = Date.now();

  // track stability
  if (closed > open) {
    closedFrames++;
    openFrames = 0;
  } else {
    openFrames++;
    closedFrames = 0;
  }

  // 👇 REAL blink trigger
  if (
    closedFrames >= 5 &&     // must be closed for ~5 frames
    !player.jumping &&
    now - lastJumpTime > 600
  ) {
    player.velocityY = -15;
    player.jumping = true;
    lastJumpTime = now;
  }
}
// ================= GAME LOGIC =================
function updateGame() {
  frame++;
  score++;

  player.y += player.velocityY;
  player.velocityY += gravity;

  if (player.y >= 150) {
    player.y = 150;
    player.jumping = false;
  }

  if (frame % 90 === 0) {
    obstacles.push({ x: 600, y: 150, w: 20, h: 20 });
  }

  obstacles.forEach(o => o.x -= 5);

  for (let o of obstacles) {
    if (
      player.x < o.x + o.w &&
      player.x + player.width > o.x &&
      player.y < o.y + o.h &&
      player.y + player.height > o.y
    ) {
    }
  }
}

// ================= DRAW =================
function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // score
  ctx.fillStyle = "#00ffcc";
  ctx.fillText("Score: " + score, 10, 20);
}

  function gameOver() {
  gameRunning = false;

  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("gameOverScreen").style.display = "flex";
}

// START GAME
init();

</script>

</body>
</html>
