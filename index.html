async function init() {
  try {
    const webcam = new tmImage.Webcam(200, 200, true);

    await webcam.setup();   // should trigger Mac camera popup
    await webcam.play();

    document.body.appendChild(webcam.canvas);

    console.log("WEBCAM WORKING");
  } catch (err) {
    console.error(err);
    alert(err);
  }
}
