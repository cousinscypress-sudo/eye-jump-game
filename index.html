<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Jump Game</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
  }

  canvas {
    border: 2px solid #00ffcc;
    display: block;
    margin: 20px auto;
    background: #111;
  }
</style>
</head>

<body>

<h2>👁️ Close Eyes = Jump</h2>

<canvas id="game" width="600" height="200"></canvas>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/ZXq0QiQqS/";

let model, webcam;
let maxPredictions;
let lastJumpTime = 0;

// GAME SETUP
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x: 50,
  y: 150,
  width: 20,
  height: 20,
  velocityY: 0,
  jumping: false
};

let gravity = 1.5;
let obstacles = [];
let frame = 0;
let score = 0;

// INIT
async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);
  maxPredictions = model.getTotalClasses();

  // 🔥 IMPORTANT: webcam setup (same style as your working project)
  webcam = new tmImage.Webcam(200, 200, true);
  await webcam.setup();
  await webcam.play();

  // 🔥 THIS IS THE FIX (make webcam visible)
  document.body.appendChild(webcam.canvas);

  window.requestAnimationFrame(loop);
}

// LOOP
async function loop() {
  webcam.update();
  await predict();
  updateGame();
  drawGame();
  window.requestAnimationFrame(loop);
}

// PREDICTION
async function predict() {
  const prediction = await model.predict(webcam.canvas);

  let open = 0;
  let closed = 0;

  for (let i = 0; i < prediction.length; i++) {
    const name = prediction[i].className.toLowerCase();

    if (name.includes("open")) open = prediction[i].probability;
    if (name.includes("closed")) closed = prediction[i].probability;
  }

  const now = Date.now();

  if (
    closed > 0.85 &&
    closed > open &&
    !player.jumping &&
    now - lastJumpTime > 500
  ) {
    player.velocityY = -15;
    player.jumping = true;
    lastJumpTime = now;
  }
}

// GAME UPDATE
function updateGame() {
  frame++;
  score++;

  player.y += player.velocityY;
  player.velocityY += gravity;

  if (player.y >= 150) {
    player.y = 150;
    player.jumping = false;
  }

  if (frame % 90 === 0) {
    obstacles.push({ x: 600, y: 150, w: 20, h: 20 });
  }

  obstacles.forEach(o => o.x -= 5);

  obstacles.forEach(o => {
    if (
      player.x < o.x + o.w &&
      player.x + player.width > o.x &&
      player.y < o.y + o.h &&
      player.y + player.height > o.y
    ) {
      alert("Game Over! Score: " + score);
      location.reload();
    }
  });
}

// DRAW
function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // score
  ctx.fillStyle = "#00ffcc";
  ctx.fillText("Score: " + score, 10, 20);
}

// START GAME
init();
</script>

</body>
</html>
