<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Jump Game</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: monospace;
    text-align: center;
  }

  canvas {
    border: 2px solid #00ffcc;
    display: block;
    margin: 20px auto;
    background: #111;
  }
</style>
</head>

<body>

<h2>👁️ Close Eyes = Jump</h2>

<canvas id="game" width="600" height="200"></canvas>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/ZXq0QiQqS/";

let model, webcam;
let lastJumpTime = 0;

// GAME
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 150, w: 20, h: 20, vy: 0, jumping: false };
let gravity = 1.5;
let obstacles = [];
let frame = 0;
let score = 0;

async function init() {
  try {
    console.log("Loading model...");

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    console.log("Starting webcam...");

    webcam = new tmImage.Webcam(200, 200, true);

    await webcam.setup();   // 👈 MUST trigger permission
    await webcam.play();

    console.log("Webcam ready");

    document.body.appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

  } catch (err) {
    console.error("INIT ERROR:", err);
    alert("Webcam failed: check console (Inspect → Console)");
  }
}

async function loop() {
  webcam.update();
  await predict();
  update();
  draw();
  requestAnimationFrame(loop);
}

async function predict() {
  const preds = await model.predict(webcam.canvas);

  let open = 0;
  let closed = 0;

  for (let p of preds) {
    const name = p.className.toLowerCase();
    if (name.includes("open")) open = p.probability;
    if (name.includes("closed")) closed = p.probability;
  }

  let now = Date.now();

  if (
    closed > 0.85 &&
    closed > open &&
    !player.jumping &&
    now - lastJumpTime > 500
  ) {
    player.vy = -15;
    player.jumping = true;
    lastJumpTime = now;
  }
}

function update() {
  frame++;
  score++;

  player.y += player.vy;
  player.vy += gravity;

  if (player.y >= 150) {
    player.y = 150;
    player.jumping = false;
  }

  if (frame % 90 === 0) {
    obstacles.push({ x: 600, y: 150, w: 20, h: 20 });
  }

  obstacles.forEach(o => o.x -= 5);

  for (let o of obstacles) {
    if (
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ) {
      alert("Game Over! Score: " + score);
      location.reload();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, 600, 200);

  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  ctx.fillStyle = "red";
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

  ctx.fillStyle = "#00ffcc";
  ctx.fillText("Score: " + score, 10, 20);
}

init();
</script>

</body>
</html>
