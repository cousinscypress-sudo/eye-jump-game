<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eye Jump</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: monospace;
  color:#00ffe0;
  text-align:center;
}

h1 {
  text-shadow:0 0 10px #00ffe0;
}

canvas {
  display:block;
  margin:20px auto;
  border:3px solid #00ffe0;
  box-shadow:0 0 20px #00ffe0;
  background:#020617;
}

#ui {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:10px;
}

.stat {
  background:#020617;
  padding:10px 20px;
  border:2px solid #00ffe0;
  box-shadow:0 0 10px #00ffe0;
}

#gameOverScreen {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#gameOverBox {
  border:3px solid #ff0040;
  padding:40px;
  box-shadow:0 0 20px #ff0040;
}

button {
  padding:10px 20px;
  background:#00ffe0;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>👁️ EYE JUMP</h1>
<p>Close your eyes to jump</p>

<canvas id="game" width="700" height="250"></canvas>

<div id="ui">
  <div class="stat">Score: <span id="score">0</span></div>
  <div class="stat">Speed: <span id="speed">5</span></div>
</div>

<div id="gameOverScreen">
  <div id="gameOverBox">
    <h2>GAME OVER</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<script>

const MODEL_URL = "./tm-my-image-model/";

let model, webcam;

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player = { x:60, y:180, w:25, h:25, vy:0, jumping:false };
let gravity = 1.2;

let obstacles = [];
let frame = 0;
let score = 0;
let speed = 5;

let gameRunning = true;

// blink detection
let closedFrames = 0;
let openFrames = 0;
let lastJump = 0;

async function init() {
  model = await tmImage.load(MODEL_URL+"model.json", MODEL_URL+"metadata.json");

  webcam = new tmImage.Webcam(200,200,true);
  await webcam.setup();
  await webcam.play();

  document.body.appendChild(webcam.canvas);

  loop();
}

async function loop() {
  if(!gameRunning) return;

  webcam.update();
  await predict();

  update();
  draw();

  requestAnimationFrame(loop);
}

async function predict() {
  const preds = await model.predict(webcam.canvas);

  let open=0, closed=0;

  preds.forEach(p=>{
    if(p.className.toLowerCase().includes("open")) open=p.probability;
    if(p.className.toLowerCase().includes("closed")) closed=p.probability;
  });

  if(closed > open){
    closedFrames++;
    openFrames=0;
  } else {
    openFrames++;
    closedFrames=0;
  }

  let now = Date.now();

  if(closedFrames>=5 && !player.jumping && now-lastJump>500){
    player.vy = -15;
    player.jumping = true;
    lastJump = now;
  }
}

function update(){
  frame++;
  score++;
  speed = 5 + score/300;

  player.y += player.vy;
  player.vy += gravity;

  if(player.y>=180){
    player.y=180;
    player.jumping=false;
  }

  if(frame % 90 === 0){
    obstacles.push({x:700, y:180, w:20, h:20});
  }

  obstacles.forEach(o=>o.x -= speed);

  for(let o of obstacles){
    if(
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ){
      gameOver();
      break;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // player glow
  ctx.fillStyle="#00ffe0";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // obstacles
  ctx.fillStyle="#ff0040";
  obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));

  document.getElementById("score").innerText = score;
  document.getElementById("speed").innerText = speed.toFixed(1);
}

function gameOver(){
  gameRunning=false;
  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("gameOverScreen").style.display="flex";
}

function restartGame(){
  score=0;
  frame=0;
  obstacles=[];
  speed=5;

  player.y=180;
  player.vy=0;
  player.jumping=false;

  closedFrames=0;
  openFrames=0;

  gameRunning=true;
  document.getElementById("gameOverScreen").style.display="none";

  loop();
}

init();

</script>

</body>
</html>
